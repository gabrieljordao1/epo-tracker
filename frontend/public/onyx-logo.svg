<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Geometric constellation / connected data points -->
  <!-- Outer diamond shape formed by connected nodes -->

  <!-- Connection lines (edges) - emerald tinted -->
  <line x1="20" y1="4" x2="33" y2="13" stroke="url(#grad1)" stroke-width="1.2" opacity="0.6"/>
  <line x1="33" y1="13" x2="33" y2="27" stroke="url(#grad1)" stroke-width="1.2" opacity="0.6"/>
  <line x1="33" y1="27" x2="20" y2="36" stroke="url(#grad1)" stroke-width="1.2" opacity="0.6"/>
  <line x1="20" y1="36" x2="7" y2="27" stroke="url(#grad1)" stroke-width="1.2" opacity="0.6"/>
  <line x1="7" y1="27" x2="7" y2="13" stroke="url(#grad1)" stroke-width="1.2" opacity="0.6"/>
  <line x1="7" y1="13" x2="20" y2="4" stroke="url(#grad1)" stroke-width="1.2" opacity="0.6"/>

  <!-- Inner cross connections -->
  <line x1="20" y1="4" x2="20" y2="20" stroke="url(#grad2)" stroke-width="1" opacity="0.4"/>
  <line x1="7" y1="13" x2="33" y2="27" stroke="url(#grad2)" stroke-width="1" opacity="0.4"/>
  <line x1="33" y1="13" x2="7" y2="27" stroke="url(#grad2)" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="20" x2="20" y2="36" stroke="url(#grad2)" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="20" x2="33" y2="13" stroke="url(#grad2)" stroke-width="1" opacity="0.35"/>
  <line x1="20" y1="20" x2="7" y2="13" stroke="url(#grad2)" stroke-width="1" opacity="0.35"/>
  <line x1="20" y1="20" x2="33" y2="27" stroke="url(#grad2)" stroke-width="1" opacity="0.35"/>
  <line x1="20" y1="20" x2="7" y2="27" stroke="url(#grad2)" stroke-width="1" opacity="0.35"/>

  <!-- Data point nodes - outer ring -->
  <circle cx="20" cy="4" r="2.5" fill="url(#nodeGrad)"/>
  <circle cx="33" cy="13" r="2.5" fill="url(#nodeGrad)"/>
  <circle cx="33" cy="27" r="2.5" fill="url(#nodeGrad)"/>
  <circle cx="20" cy="36" r="2.5" fill="url(#nodeGrad)"/>
  <circle cx="7" cy="27" r="2.5" fill="url(#nodeGrad)"/>
  <circle cx="7" cy="13" r="2.5" fill="url(#nodeGrad)"/>

  <!-- Center node - larger, brighter -->
  <circle cx="20" cy="20" r="3.5" fill="url(#centerGrad)"/>
  <circle cx="20" cy="20" r="5.5" fill="none" stroke="#34d399" stroke-width="0.5" opacity="0.2"/>

  <!-- Glow effects on nodes -->
  <circle cx="20" cy="4" r="4" fill="#34d399" opacity="0.15"/>
  <circle cx="33" cy="13" r="4" fill="#34d399" opacity="0.12"/>
  <circle cx="33" cy="27" r="4" fill="#34d399" opacity="0.12"/>
  <circle cx="20" cy="36" r="4" fill="#34d399" opacity="0.15"/>
  <circle cx="7" cy="27" r="4" fill="#34d399" opacity="0.12"/>
  <circle cx="7" cy="13" r="4" fill="#34d399" opacity="0.12"/>
  <circle cx="20" cy="20" r="6" fill="#34d399" opacity="0.1"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="nodeGrad">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </radialGradient>
    <radialGradient id="centerGrad">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
  </defs>
</svg>
